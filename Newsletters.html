  <script>
document.addEventListener("DOMContentLoaded", function () {
  const params = new URLSearchParams(window.location.search);
  const book = params.get("book");

  function openBook(id, num) {
    document.getElementById(id)?.click();
    const newUrl = `${window.location.pathname}?book=${num}`;
    window.history.replaceState({}, "", newUrl);
  }


  // Direct links (?book=1 to ?book=9)
  if (book && book >= 1 && book <= 9) {
    openBook(`book-${book}-link`, book);
  }
});
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import { getFirestore, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAveQ8PhzPcRU5Dos8E2I9eqn6Wteea74g",
    authDomain: "silhouette-club.firebaseapp.com",
    projectId: "silhouette-club",
    storageBucket: "silhouette-club.firebasestorage.app",
    messagingSenderId: "953531577603",
    appId: "1:953531577603:web:5b95576e74e80f6d64e536",
    measurementId: "G-KYZPPR1HFL"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const visitorDoc = doc(db, "visitor count", "visitor count");

  // Function to increment a field in Firestore
  async function incrementField(field) {
    try {
      await updateDoc(visitorDoc, { [field]: increment(1) });
      console.log(`${field} incremented`);
    } catch (err) {
      console.error("Error updating count:", err);
    }
  }

  // Increment total views every time the page is opened
  window.addEventListener("load", () => {
    incrementField("count");
  });

  // Increment clicks for each book
  document.getElementById("book-1-link")?.addEventListener("click", () => {
    incrementField("book1-clicks");
  });
  document.getElementById("book-2-link")?.addEventListener("click", () => {
    incrementField("book2-clicks");
  });
  document.getElementById("book-3-link")?.addEventListener("click", () => {
    incrementField("book3-clicks");
  });
  document.getElementById("book-4-link")?.addEventListener("click", () => {
    incrementField("book4-clicks");
  });
  document.getElementById("book-5-link")?.addEventListener("click", () => {
    incrementField("book5-clicks");
  });
  document.getElementById("book-6-link")?.addEventListener("click", () => {
